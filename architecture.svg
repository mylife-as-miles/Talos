<svg width="1050" height="700" viewBox="0 0 1050 700" xmlns="http://www.w3.org/2000/svg" style="background-color: #0b0f19; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>

    <!-- Node Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-sdk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="grad-splunk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="grad-out" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="grad-app" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <!-- Connectors Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#475569" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#f97316" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Technical Grid Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.6" />

  <!-- Outer Frame / Header -->
  <rect x="20" y="20" width="1010" height="660" rx="12" fill="none" stroke="#1e293b" stroke-width="2" />
  
  <text x="50" y="55" font-size="24" font-weight="900" fill="#f8fafc" letter-spacing="1">TALOS SYSTEM TOPOLOGY</text>
  <text x="50" y="75" font-size="12" font-weight="600" fill="#64748b" letter-spacing="0.5">SELF-HEALING DEVELOPER OPERATIONS LOOP FOR SPLUNK</text>

  <!-- COLUMN 1: Client Layer -->
  <g transform="translate(40, 110)">
    <!-- Column header -->
    <rect x="0" y="0" width="160" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="80" y="22" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="1">1. CLIENT RUNTIME</text>

    <!-- Dev App -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#111827" stroke="#475569" stroke-width="2" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#f1f5f9">Client App</text>
      <text x="15" y="50" font-size="11" font-weight="500" fill="#94a3b8">Next.js / Node / Browser</text>
      <text x="15" y="70" font-size="10" font-weight="700" fill="#e2e8f0" bg="black" style="font-family: monospace;">checkout-service</text>
    </g>

    <!-- Talos SDK -->
    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="160" height="120" rx="8" fill="#0c1e35" stroke="url(#grad-sdk)" stroke-width="2.5" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#00e5ff">Talos SDK</text>
      <text x="15" y="50" font-size="10" font-weight="500" fill="#94a3b8">@mylife-as-miles/talos-sdk</text>
      
      <line x1="15" y1="62" x2="145" y2="62" stroke="#1e293b" stroke-width="1" />
      
      <text x="15" y="77" font-size="10" font-weight="600" fill="#cbd5e1">• Breadcrumb Collector</text>
      <text x="15" y="92" font-size="10" font-weight="600" fill="#cbd5e1">• Error Boundary Hook</text>
      <text x="15" y="107" font-size="10" font-weight="600" fill="#cbd5e1">• Contextual Payload</text>
    </g>
  </g>

  <!-- COLUMN 2: Gateway & Intake -->
  <g transform="translate(240, 110)">
    <rect x="0" y="0" width="170" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="85" y="22" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="1">2. GATEWAY &amp; RELAY</text>

    <!-- Next.js API -->
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="170" height="150" rx="8" fill="#081e30" stroke="#00f2fe" stroke-width="2" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#00e5ff">Talos Ingest API</text>
      <text x="15" y="48" font-size="11" font-weight="700" fill="#cbd5e1" style="font-family: monospace;">POST /api/ingest</text>
      
      <line x1="15" y1="60" x2="155" y2="60" stroke="#112d46" stroke-width="1.5" />
      
      <!-- Inside features -->
      <rect x="15" y="70" width="140" height="22" rx="4" fill="#0d2a45" stroke="#1e40af" stroke-width="1" />
      <text x="25" y="84" font-size="9" font-weight="700" fill="#38bdf8">1. Project Key Validation</text>

      <rect x="15" y="97" width="140" height="22" rx="4" fill="#0d2a45" stroke="#1e40af" stroke-width="1" />
      <text x="25" y="111" font-size="9" font-weight="700" fill="#38bdf8">2. Local File Database</text>

      <rect x="15" y="124" width="140" height="22" rx="4" fill="#0d2a45" stroke="#1e40af" stroke-width="1" />
      <text x="25" y="138" font-size="9" font-weight="700" fill="#38bdf8">3. Forward to Splunk HEC</text>
    </g>

    <!-- Local Events store -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="170" height="70" rx="8" fill="#0b1329" stroke="#38425d" stroke-width="2" />
      <text x="15" y="30" font-size="13" font-weight="800" fill="#94a3b8">Local JSON Store</text>
      <text x="15" y="50" font-size="11" font-weight="500" fill="#64748b" style="font-family: monospace;">data/events.json</text>
    </g>
  </g>

  <!-- COLUMN 3: Splunk Core -->
  <g transform="translate(450, 110)">
    <rect x="0" y="0" width="180" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="22" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="1">3. SPLUNK ENGINE</text>

    <!-- HEC Endpoint -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="180" height="80" rx="8" fill="#291415" stroke="url(#grad-splunk)" stroke-width="2" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#f97316">Splunk HEC</text>
      <text x="15" y="50" font-size="10" font-weight="500" fill="#f87171">HTTP Event Collector</text>
      <text x="15" y="65" font-size="10" font-weight="700" fill="#fca5a5" style="font-family: monospace;">port: 8088 /collector</text>
    </g>

    <!-- Splunk Index -->
    <g transform="translate(0, 170)">
      <rect x="0" y="0" width="180" height="100" rx="8" fill="#1c0a0c" stroke="#ef4444" stroke-width="2" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#f97316">Splunk Index</text>
      <text x="15" y="50" font-size="10" font-weight="700" fill="#cbd5e1" style="font-family: monospace;">index=main</text>
      <text x="15" y="65" font-size="10" font-weight="700" fill="#cbd5e1" style="font-family: monospace;">sourcetype=talos:error</text>
      
      <line x1="15" y1="75" x2="165" y2="75" stroke="#451214" stroke-width="1.5" />
      <text x="15" y="88" font-size="9" font-weight="600" fill="#fca5a5">Contains: stack trace + breadcrumbs</text>
    </g>

    <!-- Splunk MCP Server -->
    <g transform="translate(0, 310)">
      <rect x="0" y="0" width="180" height="110" rx="8" fill="#2e102f" stroke="url(#grad-ai)" stroke-width="2.5" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#c084fc">Splunk MCP Server</text>
      <text x="15" y="50" font-size="10" font-weight="500" fill="#e9d5ff">Model Context Protocol Host</text>
      
      <line x1="15" y1="60" x2="165" y2="60" stroke="#4a154b" stroke-width="1.5" />
      
      <text x="15" y="75" font-size="9" font-weight="600" fill="#cbd5e1">Tool: `splunk_investigate`</text>
      <text x="15" y="90" font-size="9" font-weight="600" fill="#cbd5e1">Fallback: Splunk REST API</text>
      <text x="15" y="102" font-size="9" font-weight="600" fill="#cbd5e1">Mode: Mock Fallback Demo</text>
    </g>
  </g>

  <!-- COLUMN 4: AI Triage Resolver -->
  <g transform="translate(670, 110)">
    <rect x="0" y="0" width="180" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="22" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="1">4. RESOLVER &amp; AI</text>

    <!-- Headless Agent -->
    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="180" height="190" rx="8" fill="#1b1230" stroke="url(#grad-ai)" stroke-width="2.5" />
      <text x="15" y="30" font-size="14" font-weight="800" fill="#d8b4fe">Headless Agent</text>
      <text x="15" y="48" font-size="11" font-weight="700" fill="#e9d5ff" style="font-family: monospace;">POST /api/agent</text>
      
      <line x1="15" y1="60" x2="165" y2="60" stroke="#3b2354" stroke-width="1.5" />

      <!-- Resolver steps -->
      <rect x="10" y="70" width="160" height="22" rx="4" fill="#2e1a47" stroke="#6b21a8" stroke-width="1" />
      <text x="18" y="84" font-size="9" font-weight="700" fill="#e9d5ff">1. Extract SDK Event Context</text>

      <rect x="10" y="97" width="160" height="22" rx="4" fill="#2e1a47" stroke="#6b21a8" stroke-width="1" />
      <text x="18" y="111" font-size="9" font-weight="700" fill="#e9d5ff">2. Query Splunk HEC Logs</text>

      <rect x="10" y="124" width="160" height="22" rx="4" fill="#2e1a47" stroke="#6b21a8" stroke-width="1" />
      <text x="18" y="138" font-size="9" font-weight="700" fill="#e9d5ff">3. Anomaly Engine Scoring</text>

      <rect x="10" y="151" width="160" height="22" rx="4" fill="#2e1a47" stroke="#6b21a8" stroke-width="1" />
      <text x="18" y="165" font-size="9" font-weight="700" fill="#e9d5ff">4. Gemini RCA Report</text>
    </g>

    <!-- Anomaly Scorer -->
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="180" height="90" rx="8" fill="#061f2d" stroke="#06b6d4" stroke-width="2" />
      <text x="15" y="25" font-size="13" font-weight="800" fill="#00e5ff">Anomaly Engine</text>
      
      <line x1="15" y1="35" x2="165" y2="35" stroke="#08374f" stroke-width="1" />
      
      <text x="15" y="50" font-size="9" font-weight="600" fill="#cbd5e1">Score Metric Formula:</text>
      <text x="15" y="65" font-size="9" font-weight="700" fill="#93c5fd" style="font-family: monospace;">Score = Base + StdDev(V) + </text>
      <text x="15" y="78" font-size="9" font-weight="700" fill="#93c5fd" style="font-family: monospace;">  M(x) + CriticalRoute + Prod</text>
    </g>

    <!-- Gemini Model -->
    <g transform="translate(0, 470)">
      <rect x="0" y="0" width="180" height="90" rx="8" fill="#1e1b4b" stroke="#c084fc" stroke-width="2" />
      <text x="15" y="28" font-size="14" font-weight="800" fill="#e9d5ff">Gemini Model</text>
      <text x="15" y="48" font-size="11" font-weight="500" fill="#a5b4fc">gemini-3.5-flash</text>
      <text x="15" y="68" font-size="10" font-weight="700" fill="#cbd5e1">Strict JSON Schema Mode</text>
    </g>
  </g>

  <!-- COLUMN 5: Destinations -->
  <g transform="translate(880, 110)">
    <rect x="0" y="0" width="140" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="22" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="1">5. OUTPUTS</text>

    <!-- Talos Web UI -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="140" height="110" rx="8" fill="#06201b" stroke="url(#grad-out)" stroke-width="2.5" />
      <text x="12" y="30" font-size="14" font-weight="800" fill="#10b981">Dashboard UI</text>
      <text x="12" y="48" font-size="10" font-weight="600" fill="#a7f3d0">Next.js App Router</text>
      
      <line x1="12" y1="58" x2="128" y2="58" stroke="#073b30" stroke-width="1.5" />
      
      <text x="12" y="73" font-size="9" font-weight="600" fill="#e2e8f0">• Metrics Charts</text>
      <text x="12" y="88" font-size="9" font-weight="600" fill="#e2e8f0">• Interactive RCA</text>
      <text x="12" y="101" font-size="9" font-weight="600" fill="#e2e8f0">• Code Diff Fixes</text>
    </g>

    <!-- Local Reports store -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#0b1329" stroke="#38425d" stroke-width="2" />
      <text x="12" y="30" font-size="13" font-weight="800" fill="#94a3b8">Reports Store</text>
      <text x="12" y="50" font-size="10" font-weight="500" fill="#64748b" style="font-family: monospace;">data/reports.json</text>
    </g>

    <!-- Discord -->
    <g transform="translate(0, 310)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#161c2e" stroke="#5865f2" stroke-width="2" />
      <text x="12" y="30" font-size="14" font-weight="800" fill="#f8fafc">Discord</text>
      <text x="12" y="50" font-size="10" font-weight="500" fill="#94a3b8">Ops Webhook Alert</text>
    </g>

    <!-- Slack -->
    <g transform="translate(0, 410)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#1c181a" stroke="#e01e5a" stroke-width="2" />
      <text x="12" y="30" font-size="14" font-weight="800" fill="#f8fafc">Slack</text>
      <text x="12" y="50" font-size="10" font-weight="500" fill="#94a3b8">Chat Integration</text>
    </g>
  </g>

  <!-- DATA FLOW PATHS / CONNECTIONS -->
  
  <!-- Step 1: Client -> SDK -->
  <path d="M 200, 205 L 200, 270 L 120, 270 L 120, 290" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <circle cx="200" cy="205" r="3" fill="#64748b" />
  <rect x="155" y="240" width="80" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="195" y="253" font-size="9" font-weight="800" fill="#cbd5e1" text-anchor="middle">1. CRASH INTERCEPT</text>

  <!-- Step 2: SDK -> Ingest API -->
  <path d="M 120, 422 L 120, 450 L 220, 450 L 220, 270 L 235, 270" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <rect x="110" y="440" width="80" height="20" rx="4" fill="#093d6b" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="453" font-size="9" font-weight="800" fill="#38bdf8" text-anchor="middle">2. POST PAYLOAD</text>

  <!-- Step 3: Ingest API -> Local DB -->
  <path d="M 325, 372 L 325, 420" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  
  <!-- Step 4: Ingest API -> Splunk HEC -->
  <path d="M 412, 240 L 442, 240" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)" />
  <rect x="390" y="195" width="70" height="20" rx="4" fill="#582a0b" stroke="#c2410c" stroke-width="1"/>
  <text x="425" y="208" font-size="9" font-weight="800" fill="#ffedd5" text-anchor="middle">3. HEC RELAY</text>

  <!-- Step 5: HEC -> Index -->
  <path d="M 540, 242 L 540, 270" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-orange)" />

  <!-- Step 6: Resolver -> DB Read -->
  <line x1="325" y1="440" x2="325" y2="470" stroke="#8b5cf6" stroke-width="2" />
  <path d="M 325, 470 L 760, 470 L 760, 432" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <rect x="420" y="480" width="130" height="20" rx="4" fill="#3b0764" stroke="#6b21a8" stroke-width="1"/>
  <text x="485" y="493" font-size="9" font-weight="800" fill="#f3e8ff" text-anchor="middle">4. INCIDENT INGEST TRIGGERS</text>

  <!-- Step 7: Resolver -> Splunk MCP query -->
  <path d="M 680, 275 L 640, 275 L 640, 440 L 670, 440" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  
  <!-- Step 8: Splunk MCP -> Index search -->
  <path d="M 540, 422 L 540, 395 C 540, 395 540, 390 540, 390 L 540, 282" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)" />
  <rect x="500" y="365" width="80" height="20" rx="4" fill="#582a0b" stroke="#c2410c" stroke-width="1"/>
  <text x="540" y="378" font-size="9" font-weight="800" fill="#ffedd5" text-anchor="middle">5. SEARCH TOOL</text>

  <!-- Step 9: Splunk MCP -> Resolver context -->
  <path d="M 632, 492 L 632, 290 L 668, 290" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <rect x="590" y="320" width="85" height="20" rx="4" fill="#3b0764" stroke="#6b21a8" stroke-width="1"/>
  <text x="632.5" y="333" font-size="9" font-weight="800" fill="#f3e8ff" text-anchor="middle">6. LOG CONTEXT</text>

  <!-- Step 10: Resolver -> Anomaly Scorer -->
  <path d="M 760, 322 L 760, 345" fill="none" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 770, 348 L 770, 325" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 11: Resolver -> Gemini Prompt -->
  <path d="M 760, 432 L 760, 465" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 770, 468 L 770, 435" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="780" y="440" width="80" height="20" rx="4" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="820" y="453" font-size="9" font-weight="800" fill="#e0e7ff" text-anchor="middle">7. PROMPT CONTEXT</text>

  <!-- Step 12: Resolver saves Report & Notifies -->
  <path d="M 852, 275 L 878, 275" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="830" y="225" width="80" height="20" rx="4" fill="#064e3b" stroke="#047857" stroke-width="1"/>
  <text x="870" y="238" font-size="9" font-weight="800" fill="#ecfdf5" text-anchor="middle">8. SAVE &amp; ROUTE</text>

  <!-- Dashboard reads reports -->
  <path d="M 950, 282 L 950, 182" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Resolver pushes notifications -->
  <path d="M 852, 290 L 865, 290 L 865, 410 L 878, 410" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 852, 290 L 865, 290 L 865, 510 L 878, 510" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />

</svg>
